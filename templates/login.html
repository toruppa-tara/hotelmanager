<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ — Hotel Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-bg d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow-lg p-4" style="width:380px">
    <div class="text-center mb-4">
      <div class="login-icon mb-3">
        <i class="bi bi-building fs-1 text-primary"></i>
      </div>
      <h4 class="fw-bold">Hotel Manager</h4>
      <p class="text-muted small">ระบบจัดการโรงแรม</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label fw-semibold">ชื่อผู้ใช้</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i>เข้าสู่ระบบ
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
